name: Cee
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6"
    ARCHS: arm64
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en
targets:
  Cee:
    type: application
    platform: macOS
    sources:
      - Cee
    settings:
      base:
        INFOPLIST_FILE: Cee/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.local.cee
        PRODUCT_NAME: Cee
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: YES

  CeeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CeeTests
    dependencies:
      - target: Cee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.CeeTests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        GENERATE_INFOPLIST_FILE: YES

  CeeUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - CeeUITests
    resources:
      - CeeUITests/Fixtures
    dependencies:
      - target: Cee
    settings:
      base:
        INFOPLIST_FILE: CeeUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.local.CeeUITests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES

schemes:
  Cee:
    build:
      targets:
        Cee: all
        CeeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CeeTests
        - CeeUITests
